<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donavan Aldrich</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
/* ── Reset ─────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

/* ── Design tokens ──────────────────────────────────────────────────────────── */
:root {
  --header-bg:    #282828;
  --accent:       #427B59;
  --accent-hover: #52976e;
  --date-color:   #3d3c3a;
  --section-text: #414141;
  --page-width:   960px;
  --px:           44px;
  --sans: 'Fira Sans', 'Helvetica Neue', Arial, sans-serif;
  --mono: 'Fira Code', 'Fira Mono', 'Consolas', monospace;
}

/* ── Base ───────────────────────────────────────────────────────────────────── */
body {
  font-family: var(--sans);
  font-size: 11pt;
  line-height: 1.55;
  color: #2b2b2b;
  background: #eeecea;
}

@media screen {
  body { padding: 40px 16px 60px; }
  .page {
    max-width: var(--page-width);
    margin: 0 auto;
    background: #ffffff;
    box-shadow: 0 2px 4px rgba(0,0,0,.08), 0 8px 32px rgba(0,0,0,.12);
    border-radius: 3px;
    overflow: hidden;
  }
}

@media print {
  body { background: white; padding: 0; }
  .page { max-width: none; box-shadow: none; }
}

/* ── Header ─────────────────────────────────────────────────────────────────── */
.page-header {
  background: var(--header-bg);
  color: #ffffff;
  padding: 26px var(--px);
  position: relative;
}

.home-link {
  display: block;
  font-family: var(--mono);
  font-size: 0.62rem;
  color: rgba(255,255,255,0.45);
  text-decoration: none;
  letter-spacing: 0.06em;
  margin-bottom: 10px;
  transition: color .15s;
}
.home-link:hover { color: rgba(255,255,255,0.85); }

.header-name {
  font-family: var(--sans);
  font-size: 2.15rem;
  font-weight: 800;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  line-height: 1.1;
  color: #ffffff;
  margin-bottom: 13px;
}

.header-contact {
  display: flex;
  flex-wrap: wrap;
  column-gap: 28px;
  row-gap: 7px;
  align-items: center;
}

.contact-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.84rem;
  color: #cccccc;
  white-space: nowrap;
}

.contact-icon {
  font-size: 0.9rem;
  width: 1em;
  text-align: center;
  flex-shrink: 0;
}
.ci-loc  { color: #f07068; }
.ci-tel  { color: #F9BD30; }
.ci-mail { color: #6ac28a; }
.ci-in   { color: #5bbcc0; }

.contact-item a { color: inherit; text-decoration: none; transition: color .15s; }
.contact-item a:hover { color: #ffffff; }

/* ── Responsive ──────────────────────────────────────────────────────────────── */
@media (max-width: 620px) {
  :root { --px: 20px; }
  .header-name { font-size: 1.55rem; }
  .header-contact { column-gap: 14px; }
}

/* ── Print ───────────────────────────────────────────────────────────────────── */
@media print {
  .page-header {
    background: var(--header-bg) !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .home-link { display: none; }
  a { color: inherit !important; text-decoration: none !important; }
}
.hub-body {
  padding: 44px var(--px) 56px;
}

.nav-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.nav-card {
  display: flex;
  flex-direction: column;
  border: 1px solid #e0e0e0;
  border-radius: 4px;
  padding: 24px;
  text-decoration: none;
  color: inherit;
  transition: border-color .2s, box-shadow .2s;
}

.nav-card:hover {
  border-color: var(--accent);
  box-shadow: 0 2px 12px rgba(66,123,89,.15);
}

.nav-card-icon {
  font-size: 1.4rem;
  color: var(--accent);
  margin-bottom: 12px;
}

.nav-card-title {
  font-size: 1rem;
  font-weight: 700;
  color: #1a1a1a;
  margin-bottom: 6px;
}

.nav-card-desc {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--date-color);
  line-height: 1.55;
  flex: 1;
}

.nav-card-secondary {
  display: inline-block;
  margin-top: 14px;
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--accent);
}

@media (max-width: 620px) {
  .nav-cards { grid-template-columns: 1fr; }
}
  </style>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <div class="header-name">Donavan Aldrich</div>
      <div class="header-contact">
    <span class="contact-item"><i class="fas fa-map-marker-alt contact-icon ci-loc"></i>Dallas, TX</span>
    <span class="contact-item"><i class="fas fa-phone-square contact-icon ci-tel"></i>(573) 239-5923</span>
    <span class="contact-item"><i class="fas fa-envelope contact-icon ci-mail"></i><a href="mailto:aldrich.don@gmail.com">aldrich.don@gmail.com</a></span>
    <span class="contact-item"><i class="fab fa-linkedin contact-icon ci-in"></i><a href="https://www.linkedin.com/in/donavan-aldrich/" target="_blank" rel="noopener">donavan-aldrich</a></span>
      </div>
    </header>
    <div class="hub-body">
      <div class="nav-cards">
  <a class="nav-card" href="resume.html">
    <div class="nav-card-icon"><i class="fas fa-file-alt"></i></div>
    <div class="nav-card-title">Resume</div>
    <div class="nav-card-desc">Work history, skills, and certifications</div>
    <a class="nav-card-secondary" href="resume.pdf" onclick="event.stopPropagation()">Download PDF ↓</a>
  </a>
  <a class="nav-card" href="cover-letter.html">
    <div class="nav-card-icon"><i class="fas fa-envelope-open-text"></i></div>
    <div class="nav-card-title">Cover Letter</div>
    <div class="nav-card-desc">Personalise with ?company= and ?title= URL params</div>
  </a>
  <a class="nav-card" href="projects.html">
    <div class="nav-card-icon"><i class="fas fa-code-branch"></i></div>
    <div class="nav-card-title">Projects</div>
    <div class="nav-card-desc">Repos, tools, and selected work</div>
  </a>
      </div>
    </div>
  </div>
</body>
</html>
